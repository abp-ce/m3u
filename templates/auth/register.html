{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}{{ _('Register') }}{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="username">{{ _('Username') }}</label>
    <input name="username" id="username" required>
    <label for="password">{{ _('Password') }}</label>
    <input type="password" name="password" id="password" required>
    <input type="submit" value="{{ _('Register') }}">
    <div style="display: flex; align-items: center;">
      <span>{{ _('Register with') }}</span>
      <a href="{{ url_for('auth.yandex') }}">
        <img alt = "{{ _('Yandex register') }}" src="{{ url_for('static', filename='yandex_logo.png') }}" width="80"></a>
      <a href="{{ url_for('auth.google') }}">
        <img alt = "{{ _('Google register') }}" src="{{ url_for('static', filename='google_logo.png') }}" width="70"></a>
    </div>
  </form>
{% endblock %}
